syntax = "proto3";

package lead;

// Lead message representing lead record
message Lead {
  int32 profile_id = 1;
  string name = 2;
  string campaign = 3;
  string source = 4;
  string sub_source = 5;
  string received = 6;
  string phone = 7;
  string lead_id = 8;
  string stage = 9;
  string status = 10;
  string exe_user = 11;
  string exe_user_name = 12;
}

// Request message for GetAllLeads
message GetAllLeadsRequest {
  string organization = 1;
  int32 offset = 2;
  int32 limit = 3;
}

// Response message for GetAllLeads
message GetAllLeadsResponse {
  repeated Lead leads = 1;
  int32 total = 2;
}

// Lead service definition
service LeadService {
  rpc GetAllLeads(GetAllLeadsRequest) returns (GetAllLeadsResponse);
}
